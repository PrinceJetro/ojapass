<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OjaPass Login - OjaFinance</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts: Fraunces & DM Sans -->
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&amp;family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed-variant": "#1d5035",
                    "tertiary-fixed-dim": "#9dd3b0",
                    "on-secondary-container": "#6b4800",
                    "primary-container": "#1b6b45",
                    "secondary-container": "#ffb21d",
                    "surface-container-lowest": "#ffffff",
                    "background": "#fcf9f3",
                    "on-error": "#ffffff",
                    "tertiary-container": "#36684b",
                    "surface-dim": "#dcdad4",
                    "inverse-primary": "#8ad7a8",
                    "surface-container-high": "#ebe8e2",
                    "secondary": "#805600",
                    "on-tertiary": "#ffffff",
                    "on-primary": "#ffffff",
                    "on-primary-container": "#9be9b9",
                    "primary-fixed": "#a5f3c3",
                    "outline": "#6f7a71",
                    "error": "#ba1a1a",
                    "surface": "#fcf9f3",
                    "on-secondary-fixed-variant": "#614000",
                    "surface-variant": "#e5e2dc",
                    "surface-bright": "#fcf9f3",
                    "surface-tint": "#1b6b45",
                    "surface-container": "#f0eee8",
                    "surface-container-low": "#f6f3ed",
                    "on-error-container": "#93000a",
                    "on-tertiary-container": "#afe4c1",
                    "on-secondary-fixed": "#281800",
                    "on-background": "#1c1c18",
                    "tertiary": "#1d5035",
                    "on-secondary": "#ffffff",
                    "outline-variant": "#bfc9bf",
                    "on-surface-variant": "#3f4942",
                    "on-surface": "#1c1c18",
                    "tertiary-fixed": "#b9efcb",
                    "primary": "#005231",
                    "on-primary-fixed-variant": "#005231",
                    "secondary-fixed": "#ffddaf",
                    "primary-fixed-dim": "#8ad7a8",
                    "secondary-fixed-dim": "#ffba44",
                    "surface-container-highest": "#e5e2dc",
                    "on-tertiary-fixed": "#002111",
                    "inverse-surface": "#31312d",
                    "error-container": "#ffdad6",
                    "on-primary-fixed": "#002111",
                    "inverse-on-surface": "#f3f0ea"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "lg": "24px",
                    "xl": "32px",
                    "gutter": "16px",
                    "md": "16px",
                    "base": "4px",
                    "xs": "4px",
                    "sm": "8px",
                    "margin-mobile": "20px",
                    "margin-desktop": "64px"
            },
            "fontFamily": {
                    "body-lg": ["dmSans"],
                    "display-lg": ["Fraunces"],
                    "label-lg": ["dmSans"],
                    "headline-md": ["dmSans"],
                    "display-md": ["Fraunces"],
                    "headline-lg": ["Fraunces"],
                    "body-md": ["dmSans"],
                    "label-sm": ["dmSans"]
            },
            "fontSize": {
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "700"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "700"}],
                    "display-md": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "headline-lg": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}]
            }
          },
        },
      }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #fcf9f3; }
        .pin-dot {
            width: 16px;
            height: 16px;
            border-radius: 9999px;
            border: 2px solid #bfc9bf;
            transition: all 0.2s ease-in-out;
        }
        .pin-dot.active {
            background-color: #005231;
            border-color: #005231;
            transform: scale(1.1);
        }
        .keypad-btn {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            transition: all 0.15s ease-in-out;
            font-size: 1.5rem;
            font-weight: 700;
        }
        .keypad-btn:active {
            background-color: #f0eee8;
            transform: scale(0.92);
        }
        .login-step { transition: all 0.4s ease-in-out; }
        .hidden { display: none; opacity: 0; transform: translateY(10px); }
    </style>
</head>
<body class="font-body-md text-on-surface flex min-h-screen flex-col overflow-x-hidden">
    <main class="flex-grow flex items-center justify-center px-gutter py-xl">
        <div class="w-full max-w-[440px] flex flex-col gap-xl">
            <!-- Branding Section -->
            <div class="flex flex-col items-center text-center gap-md">
                <div class="flex items-center gap-sm">
                    <span class="material-symbols-outlined text-primary text-[40px]">fingerprint</span>
                    <h1 class="font-display-md text-3xl font-bold text-primary">OjaPass</h1>
                </div>
                <div class="space-y-xs">
                    <h2 id="login-title" class="text-2xl font-display font-bold text-on-background">Welcome back</h2>
                    <p id="login-subtitle" class="text-on-surface-variant">Sign in to your economic identity.</p>
                </div>
            </div>

            <!-- Login Card -->
            <div class="bg-surface-container-lowest border border-outline-variant/20 rounded-[32px] p-8 shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 left-0 right-0 h-1.5 bg-secondary-container"></div>
                
                <form id="login-form" class="space-y-8">
                    {% csrf_token %}
                    
                    <!-- Step 1: Phone Input -->
                    <div id="step-phone" class="login-step space-y-6">
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-bold text-primary uppercase tracking-wider" for="phone">Phone Number</label>
                            <div class="relative flex items-center">
                                <div class="absolute left-4 flex items-center gap-2 pr-3 border-r border-outline-variant/30">
                                    <span class="text-on-surface font-bold"></span>
                                </div>
                                <input class="w-full h-16 pl-20 pr-4 bg-surface-container-low border-none rounded-2xl focus:ring-2 focus:ring-primary transition-all outline-none text-lg font-medium" id="phone" name="phone" placeholder="0803 000 0000" required type="tel"/>
                            </div>
                        </div>
                        <button type="button" onclick="showStepPin()" class="w-full bg-primary text-white font-bold h-16 rounded-2xl shadow-lg shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                            Continue to PIN
                            <span class="material-symbols-outlined">arrow_forward</span>
                        </button>
                    </div>

                    <!-- Step 2: PIN Pad -->
                    <div id="step-pin" class="login-step hidden space-y-8">
                        <div class="flex flex-col items-center">
                            <!-- PIN Dots -->
                            <div class="flex gap-6 mb-8">
                                <div class="pin-dot" id="dot-1"></div>
                                <div class="pin-dot" id="dot-2"></div>
                                <div class="pin-dot" id="dot-3"></div>
                                <div class="pin-dot" id="dot-4"></div>
                            </div>

                            <!-- Numeric Keypad -->
                            <div class="w-full grid grid-cols-3 gap-4 max-w-[280px]">
                                <button type="button" class="keypad-btn hover:bg-surface-container" onclick="pressKey('1')">1</button>
                                <button type="button" class="keypad-btn hover:bg-surface-container" onclick="pressKey('2')">2</button>
                                <button type="button" class="keypad-btn hover:bg-surface-container" onclick="pressKey('3')">3</button>
                                <button type="button" class="keypad-btn hover:bg-surface-container" onclick="pressKey('4')">4</button>
                                <button type="button" class="keypad-btn hover:bg-surface-container" onclick="pressKey('5')">5</button>
                                <button type="button" class="keypad-btn hover:bg-surface-container" onclick="pressKey('6')">6</button>
                                <button type="button" class="keypad-btn hover:bg-surface-container" onclick="pressKey('7')">7</button>
                                <button type="button" class="keypad-btn hover:bg-surface-container" onclick="pressKey('8')">8</button>
                                <button type="button" class="keypad-btn hover:bg-surface-container" onclick="pressKey('9')">9</button>
                                <button type="button" class="keypad-btn text-on-surface-variant" onclick="showStepPhone()">
                                    <span class="material-symbols-outlined">arrow_back</span>
                                </button>
                                <button type="button" class="keypad-btn hover:bg-surface-container" onclick="pressKey('0')">0</button>
                                <button type="button" class="keypad-btn text-on-surface-variant" onclick="pressDelete()">
                                    <span class="material-symbols-outlined">backspace</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="text-center space-y-6">
                <p class="text-on-surface-variant">
                    New to OjaPass? 
                    <a class="text-primary font-bold hover:underline" href="{% url 'onboarding' %}">Create account</a>
                </p>
                <div class="flex items-center justify-center gap-8 opacity-40">
                    <div class="flex items-center gap-1.5">
                        <span class="material-symbols-outlined text-sm">lock</span>
                        <span class="text-[10px] font-bold uppercase tracking-widest">Encrypted</span>
                    </div>
                    <div class="flex items-center gap-1.5">
                        <span class="material-symbols-outlined text-sm">verified_user</span>
                        <span class="text-[10px] font-bold uppercase tracking-widest">Verified</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let pin = "";
        const phoneInput = document.getElementById('phone');
        const stepPhone = document.getElementById('step-phone');
        const stepPin = document.getElementById('step-pin');
        const loginTitle = document.getElementById('login-title');
        const loginSubtitle = document.getElementById('login-subtitle');

        function showStepPin() {
            if (!phoneInput.value) {
                alert("Please enter your phone number");
                return;
            }
            stepPhone.classList.add('hidden');
            setTimeout(() => {
                stepPhone.style.display = 'none';
                stepPin.style.display = 'block';
                setTimeout(() => stepPin.classList.remove('hidden'), 50);
                loginTitle.innerText = "Enter your PIN";
                loginSubtitle.innerText = `Logging in as +234 ${phoneInput.value}`;
            }, 400);
        }

        function showStepPhone() {
            pin = "";
            updateDots();
            stepPin.classList.add('hidden');
            setTimeout(() => {
                stepPin.style.display = 'none';
                stepPhone.style.display = 'block';
                setTimeout(() => stepPhone.classList.remove('hidden'), 50);
                loginTitle.innerText = "Welcome back";
                loginSubtitle.innerText = "Sign in to your economic identity.";
            }, 400);
        }

        function pressKey(num) {
            if (pin.length < 4) {
                pin += num;
                updateDots();
                if (pin.length === 4) {
                    submitLogin();
                }
            }
        }

        function pressDelete() {
            pin = pin.slice(0, -1);
            updateDots();
        }

        function updateDots() {
            for (let i = 1; i <= 4; i++) {
                const dot = document.getElementById(`dot-${i}`);
                if (i <= pin.length) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            }
        }

        async function submitLogin() {
            const formData = {
                phone: phoneInput.value,
                pin: pin
            };

            try {
                const response = await fetch("{% url 'login' %}", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();
                if (data.success) {
                    window.location.href = "{% url 'mamatally_dashboard' %}";
                } else {
                    alert(data.message || "Invalid credentials");
                    pin = "";
                    updateDots();
                }
            } catch (error) {
                console.error("Login error:", error);
                alert("A connection error occurred. Please try again.");
                pin = "";
                updateDots();
            }
        }
    </script>
</body>
</html>
<!-- Visual Decorative Elements (Bento style hint) -->
<div class="fixed -bottom-24 -left-24 w-64 h-64 bg-primary-container/10 rounded-full blur-3xl -z-10"></div>
<div class="fixed top-12 -right-12 w-48 h-48 bg-secondary-container/10 rounded-full blur-2xl -z-10"></div>
<!-- Security Footer -->
<footer class="py-md px-gutter text-center border-t border-outline-variant/10">
<p class="font-label-sm text-label-sm text-on-surface-variant/60 italic">
            OjaPass is a secure digital identity layer by OjaFinance. Licensed by the Central Bank of Nigeria.
        </p>
</footer>
</body></html>
